<section class="login-page">
  <!-- Fondo animado con partículas / ondas -->
  <div class="bg-overlay">
    <div class="bg-circle bg-circle--1"></div>
    <div class="bg-circle bg-circle--2"></div>
    <div class="bg-circle bg-circle--3"></div>
  </div>

  <!-- Card principal -->
  <div class="login-card" [class.shake]="hasError()">

    <!-- Logo / Branding -->
    <div class="login-header">
      <div class="logo-wrapper">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          </svg>
        </div>
      </div>
      <h1 class="login-title">Biblioteca</h1>
      <p class="login-subtitle">Bienvenido de vuelta. Ingresa tus credenciales.</p>
    </div>

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form" novalidate autocomplete="off">

      <!-- Campo Email -->
      <div class="field-group" [class.field-error]="emailInvalid()">
        <label for="email" class="field-label">Correo electrónico</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="field-input"
            placeholder="you@ejemplo.com"
            autocomplete="off"
          />
        </div>
        @if (emailInvalid()) {
          <span class="field-error-msg">Ingresa un correo electrónico válido.</span>
        }
      </div>

      <!-- Campo Password -->
      <div class="field-group" [class.field-error]="passwordInvalid()">
        <label for="password" class="field-label">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            class="field-input"
            placeholder="••••••••"
            autocomplete="off"
          />
          <button type="button" class="toggle-password" (click)="togglePassword()" tabindex="-1"
            [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            @if (showPassword()) {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
        @if (passwordInvalid()) {
          <span class="field-error-msg">La contraseña debe tener al menos 6 caracteres.</span>
        }
      </div>

      <!-- Error de autenticación -->
      @if (errorMessage()) {
        <div class="alert-error" role="alert">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMessage() }}
        </div>
      }

      <!-- Botón de login -->
      <button
        id="btn-login"
        type="submit"
        class="btn-login"
        [disabled]="isLoading()"
      >
        @if (isLoading()) {
          <span class="spinner"></span>
          <span>Verificando...</span>
        } @else {
          <span>Iniciar sesión</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        }
      </button>

    </form>

    <!-- Footer de la card -->
    <div class="login-footer">
      <p>Sistema de gestión de biblioteca &copy; {{ currentYear }}</p>
    </div>

  </div>
</section>
