@if (isAuthenticated() && !isPublicPage()) {
<nav class="fixed left-0 top-0 h-screen w-64 bg-slate-900/70 backdrop-blur-2xl border-r border-slate-800/50 z-50 flex flex-col p-6 shadow-[4px_0_24px_rgba(0,0,0,0.4)]">
  
  <!-- Logo Section -->
  <div class="mb-12">
    <h1 class="text-2xl text-white tracking-[0.2em] leading-tight" style="font-family: 'Cinzel', serif;">
      BIBLIOTECA<br>
      <span class="text-green-500 font-black">DIGITAL</span>
    </h1>
    <div class="h-0.5 w-12 bg-green-500/50 rounded-full mt-4 shadow-[0_0_15px_rgba(34,197,94,0.3)]"></div>
  </div>

  <!-- Menu Links -->
  <div class="flex-1 flex flex-col gap-2">
    <span class="text-[9px] text-gray-600 font-black uppercase tracking-[0.4em] mb-4 px-2">Archivo Principal</span>
    
    <a routerLink="/dashboard" 
       routerLinkActive="bg-green-500/10 text-green-400 border-green-500/20 shadow-[inset_0_0_20px_rgba(34,197,94,0.05)]"
       class="flex items-center gap-4 px-4 py-3.5 rounded-xl text-gray-500 hover:text-white hover:bg-white/5 transition-all group border border-transparent">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-50 group-hover:opacity-100 transition-opacity"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        <span class="text-[11px] font-black uppercase tracking-[0.15em]">Dashboard</span>
    </a>

    <a routerLink="/libros" 
       routerLinkActive="bg-green-500/10 text-green-400 border-green-500/20 shadow-[inset_0_0_20px_rgba(34,197,94,0.05)]"
       class="flex items-center gap-4 px-4 py-3.5 rounded-xl text-gray-500 hover:text-white hover:bg-white/5 transition-all group border border-transparent">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-50 group-hover:opacity-100 transition-opacity"><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/><path d="M12 2H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-4"/></svg>
        <span class="text-[11px] font-black uppercase tracking-[0.15em]">Catálogo</span>
    </a>

    <ng-container *ngIf="currentUser()?.rol === 'admin' || currentUser()?.rol === 'bibliotecario'">
      <div class="h-px bg-gray-900/50 my-6 mx-2"></div>
      <span class="text-[9px] text-gray-600 font-black uppercase tracking-[0.4em] mb-4 px-2">Administración</span>

      <a routerLink="/prestamos" 
         routerLinkActive="bg-green-500/10 text-green-400 border-green-500/20 shadow-[inset_0_0_20px_rgba(34,197,94,0.05)]"
         class="flex items-center gap-4 px-4 py-3.5 rounded-xl text-gray-500 hover:text-white hover:bg-white/5 transition-all group border border-transparent">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-50 group-hover:opacity-100 transition-opacity"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><path d="m9 9.5 2 2 4-4"/></svg>
          <span class="text-[11px] font-black uppercase tracking-[0.15em]">Préstamos</span>
      </a>
      
      <a *ngIf="currentUser()?.rol === 'admin'" 
         routerLink="/usuarios" 
         routerLinkActive="bg-green-500/10 text-green-400 border-green-500/20 shadow-[inset_0_0_20px_rgba(34,197,94,0.05)]"
         class="flex items-center gap-4 px-4 py-3.5 rounded-xl text-gray-500 hover:text-white hover:bg-white/5 transition-all group border border-transparent">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-50 group-hover:opacity-100 transition-opacity"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="text-[11px] font-black uppercase tracking-[0.15em]">Usuarios</span>
      </a>
    </ng-container>
  </div>

  <!-- User Info & Logout -->
  <div class="pt-6 border-t border-gray-900 mt-auto">
    <div class="flex items-center gap-3 mb-6 px-2">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center text-white font-black shadow-lg shadow-green-900/40 border border-green-400/20">
        {{ currentUser()?.nombre?.substring(0,1) }}
      </div>
      <div class="flex flex-col min-w-0">
        <span class="text-[11px] font-black text-white truncate uppercase tracking-tighter">{{ currentUser()?.nombre }}</span>
        <span class="text-[8px] text-gray-600 font-bold uppercase tracking-[0.2em]">{{ currentUser()?.rol }}</span>
      </div>
    </div>
    
    <button (click)="onLogout()" 
            class="w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-red-500/60 hover:text-red-400 hover:bg-red-500/5 transition-all group border border-transparent">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-50 group-hover:opacity-100 transition-opacity"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="text-[11px] font-black uppercase tracking-[0.15em]">Cerrar Sesión</span>
    </button>
  </div>
</nav>
}
